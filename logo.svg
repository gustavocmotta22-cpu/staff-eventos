<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Fundo gradiente azul profundo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#112240;stop-opacity:1" />
    </linearGradient>
    <!-- Gradiente dourado -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4920A;stop-opacity:1" />
    </linearGradient>
    <!-- Gradiente azul claro para detalhes -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9EDB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2176AE;stop-opacity:1" />
    </linearGradient>
    <!-- Brilho suave -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#4A9EDB;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0A1628;stop-opacity:0" />
    </radialGradient>
    <!-- Sombra -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#F5C842" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Brilho de fundo -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glowGrad)"/>

  <!-- Borda sutil dourada -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.3"/>

  <!-- ═══ SÍMBOLO CENTRAL ═══ -->
  <!-- Estrela / Âncora de 6 pontas estilizada representando coordenação e estabilidade -->

  <!-- Círculo externo decorativo -->
  <circle cx="256" cy="220" r="110" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.4" stroke-dasharray="8 6"/>

  <!-- Círculo médio -->
  <circle cx="256" cy="220" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.25"/>

  <!-- Hexágono central (estabilidade, organização) -->
  <polygon
    points="256,138 326,178 326,262 256,302 186,262 186,178"
    fill="url(#bgGrad)"
    stroke="url(#goldGrad)"
    stroke-width="2.5"
    filter="url(#glow)"
  />

  <!-- Brilho interno do hexágono -->
  <polygon
    points="256,138 326,178 326,262 256,302 186,262 186,178"
    fill="url(#glowGrad)"
    opacity="0.6"
  />

  <!-- Silhueta humana estilizada (o profissional) -->
  <!-- Cabeça -->
  <circle cx="256" cy="182" r="22" fill="url(#goldGrad)" filter="url(#shadow)"/>

  <!-- Corpo / tronco com linhas de staff/equipe -->
  <path d="M226,248 Q226,215 256,210 Q286,215 286,248 L276,248 Q276,222 256,218 Q236,222 236,248 Z"
        fill="url(#goldGrad)" filter="url(#shadow)"/>

  <!-- Braços estendidos (acolhimento, gestão de equipe) -->
  <path d="M226,230 L196,218" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>
  <path d="M286,230 L316,218" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>

  <!-- Mãos (bolinhas) -->
  <circle cx="193" cy="216" r="7" fill="url(#goldGrad)"/>
  <circle cx="319" cy="216" r="7" fill="url(#goldGrad)"/>

  <!-- Checkmark / estrela de confirmação acima -->
  <path d="M241,160 L250,172 L271,152"
        stroke="#4A9EDB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Pontos decorativos nos vértices do hexágono (equipe) -->
  <circle cx="256" cy="138" r="5" fill="url(#blueGrad)" opacity="0.8"/>
  <circle cx="326" cy="178" r="5" fill="url(#blueGrad)" opacity="0.8"/>
  <circle cx="326" cy="262" r="5" fill="url(#blueGrad)" opacity="0.8"/>
  <circle cx="256" cy="302" r="5" fill="url(#blueGrad)" opacity="0.8"/>
  <circle cx="186" cy="262" r="5" fill="url(#blueGrad)" opacity="0.8"/>
  <circle cx="186" cy="178" r="5" fill="url(#blueGrad)" opacity="0.8"/>

  <!-- ═══ TEXTO ═══ -->
  <!-- STAFF -->
  <text
    x="256" y="355"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="58"
    font-weight="900"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#shadow)"
  >STAFF</text>

  <!-- Linha separadora decorativa -->
  <line x1="156" y1="368" x2="356" y2="368" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="256" cy="368" r="3" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="176" cy="368" r="2" fill="url(#blueGrad)" opacity="0.5"/>
  <circle cx="336" cy="368" r="2" fill="url(#blueGrad)" opacity="0.5"/>

  <!-- EVENTOS -->
  <text
    x="256" y="410"
    font-family="'Arial', sans-serif"
    font-size="34"
    font-weight="400"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="12"
    opacity="0.85"
  >EVENTOS</text>

  <!-- Tagline -->
  <text
    x="256" y="448"
    font-family="'Arial', sans-serif"
    font-size="14"
    font-weight="300"
    fill="#4A9EDB"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.7"
  >GESTÃO INTELIGENTE</text>

  <!-- Estrelinhas decorativas nos cantos -->
  <text x="82" y="108" font-size="12" fill="#F5C842" opacity="0.4">✦</text>
  <text x="418" y="108" font-size="12" fill="#F5C842" opacity="0.4">✦</text>
  <text x="68" y="420" font-size="8" fill="#4A9EDB" opacity="0.3">✦</text>
  <text x="432" y="420" font-size="8" fill="#4A9EDB" opacity="0.3">✦</text>
</svg>
